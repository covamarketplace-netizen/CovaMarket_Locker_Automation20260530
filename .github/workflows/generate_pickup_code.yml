name: Generate XYZ Vending Pickup Code

on:
  push:
    paths:
      - 'orders/orders_*.json'
  workflow_dispatch:
    inputs:
      order_id:
        description: 'Shopify Order ID'
        required: false
        default: 'test-order'
      customer_name:
        description: 'Customer Name'
        required: false
        default: 'Valued Customer'
      customer_email:
        description: 'Customer Email'
        required: false
        default: 'alejandra.evander92@gmail.com'
      pickup_location:
        description: 'Pickup Location'
        required: false
        default: 'CovaMarket Locker'
      pickup_date:
        description: 'Pickup Date'
        required: false
        default: 'N/A'
      pickup_time:
        description: 'Pickup Time'
        required: false
        default: 'N/A'

jobs:
  generate-pickup-code:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show current active_lockers.json
        run: |
          echo "📋 Current active_lockers.json:"
          cat pickup_codes/active_lockers.json 2>/dev/null || echo "(file does not exist yet)"

      - name: Generate pickup code
        id: generate
        env:
          XYZ_TOKEN:  ${{ secrets.XYZ_TOKEN }}
          XYZ_FUN_ID: ${{ secrets.XYZ_FUN_ID }}
        run: |
          set +e
          OUTPUT=$(node generate_pickup_code.js 2>&1)
          EXIT_CODE=$?
          echo "──────── Output ────────"
          echo "$OUTPUT"
          echo "────────────────────────"

          JSON=$(echo "$OUTPUT" | grep "OUTPUT_JSON:" | sed 's/OUTPUT_JSON://')
          PICK_CODE=$(echo "$JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('pickCode',''))" 2>/dev/null || echo "")
          LOCKER=$(echo "$JSON"   | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('locker',''))"   2>/dev/null || echo "")

          echo "pick_code=$PICK_CODE" >> $GITHUB_OUTPUT
          echo "locker=$LOCKER"       >> $GITHUB_OUTPUT

          mkdir -p pickup_codes
          echo "$JSON" > pickup_codes/latest.json

          echo "📋 active_lockers.json after script ran:"
          cat pickup_codes/active_lockers.json 2>/dev/null || echo "(MISSING)"

          exit $EXIT_CODE

      - name: Send pickup code email to customer
        if: success() && steps.generate.outputs.pick_code != ''
        env:
          GMAIL_USER:      covamarketplace@gmail.com
          GMAIL_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL:        ${{ github.event.inputs.customer_email || 'alejandra.evander92@gmail.com' }}
          CUSTOMER_NAME:   ${{ github.event.inputs.customer_name  || 'Valued Customer' }}
          ORDER_ID:        ${{ github.event.inputs.order_id       || 'test-order' }}
          PICK_CODE:       ${{ steps.generate.outputs.pick_code }}
          LOCKER:          ${{ steps.generate.outputs.locker }}
          PICKUP_LOCATION: ${{ github.event.inputs.pickup_location || 'CovaMarket Locker' }}
          PICKUP_DATE:     ${{ github.event.inputs.pickup_date     || 'N/A' }}
          PICKUP_TIME:     ${{ github.event.inputs.pickup_time     || 'N/A' }}
        run: |
          echo "📧 Sending pickup code email..."
          node send_email.js

      - name: Commit tracking files
        if: success() && steps.generate.outputs.pick_code != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f pickup_codes/active_lockers.json pickup_codes/latest.json

          echo "📋 Git status after add:"
          git status

          git diff --staged --quiet && echo "⚠️ Nothing to commit — file unchanged" || \
            git commit -m "Pickup code ${{ steps.generate.outputs.pick_code }} → locker ${{ steps.generate.outputs.locker }} (order ${{ github.event.inputs.order_id }})"

          git push origin main
