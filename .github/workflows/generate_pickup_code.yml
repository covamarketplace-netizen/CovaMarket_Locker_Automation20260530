name: Generate XYZ Vending Pickup Code

on:
  push:
    paths:
      - 'orders/orders_*.json'
  workflow_dispatch:
    inputs:
      order_id:
        description: 'Shopify Order ID'
        required: false
        default: 'test-order'

jobs:
  generate-pickup-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm init -y && npm install

      - name: Generate pickup code
        id: generate
        env:
          XYZ_TOKEN:  ${{ secrets.XYZ_TOKEN }}
          XYZ_FUN_ID: ${{ secrets.XYZ_FUN_ID }}
        run: |
          set +e
          OUTPUT=$(node generate_pickup_code.js 2>&1)
          echo "──────── Output ────────"
          echo "$OUTPUT"
          echo "────────────────────────"
          JSON=$(echo "$OUTPUT" | grep "OUTPUT_JSON:" | sed 's/OUTPUT_JSON://')
          echo "result=$JSON" >> $GITHUB_OUTPUT
          PICK_CODE=$(echo "$JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('pickCode',''))" 2>/dev/null || echo "")
          echo "pick_code=$PICK_CODE" >> $GITHUB_OUTPUT
          echo "✅ Pickup code: $PICK_CODE"

      - name: Send pickup code to customer
        if: success() && steps.generate.outputs.pick_code != ''
        env:
          PICK_CODE: ${{ steps.generate.outputs.pick_code }}
          ORDER_ID:  ${{ github.event.inputs.order_id }}
        run: |
          echo "📦 Pickup code $PICK_CODE for order $ORDER_ID"
          # Add WhatsApp/email notification here

      - name: Save result
        if: success() && steps.generate.outputs.pick_code != ''
        run: |
          mkdir -p pickup_codes
          echo '${{ steps.generate.outputs.result }}' > pickup_codes/latest.json
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pickup_codes/
          git diff --staged --quiet || git commit -m "Pickup code ${{ steps.generate.outputs.pick_code }} for order ${{ github.event.inputs.order_id }}"
          git push
