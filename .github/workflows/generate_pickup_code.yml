name: Generate XYZ Vending Pickup Code

on:
  push:
    paths:
      - 'order_consolidation/orders_*.json'
  workflow_dispatch:  # no inputs needed — everything comes from the order JSON

jobs:
  generate-pickup-code:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show current active_lockers.json
        run: |
          echo "📋 Current active_lockers.json:"
          cat pickup_codes/active_lockers.json 2>/dev/null || echo "(file does not exist yet)"

      - name: Resolve order file path
        id: order_file
        run: |
          FILE=$(ls order_consolidation/orders_*.json 2>/dev/null | sort | tail -1)
          if [ -z "$FILE" ]; then echo "❌ No order file found in order_consolidation/"; exit 1; fi
          echo "path=$FILE" >> $GITHUB_OUTPUT
          echo "📋 Using order file: $FILE"

      - name: Generate pickup code
        id: generate
        env:
          XYZ_TOKEN:   ${{ secrets.XYZ_TOKEN }}
          ORDERS_FILE: ${{ steps.order_file.outputs.path }}
        run: |
          set +e
          OUTPUT=$(node generate_pickup_code.js 2>&1)
          EXIT_CODE=$?
          echo "──────── Output ────────"
          echo "$OUTPUT"
          echo "────────────────────────"

          # Extract all OUTPUT_JSON lines (one per order)
          JSONS=$(echo "$OUTPUT" | grep "OUTPUT_JSON:" | sed 's/OUTPUT_JSON://')
          ORDER_COUNT=$(echo "$JSONS" | grep -c "success" || echo "0")
          echo "📦 Orders processed: $ORDER_COUNT"

          # Write a helper python script to parse results
          cat > /tmp/parse_orders.py << 'PYEOF'
import sys, json

lines = [l.strip() for l in sys.stdin if l.strip()]
results = []
first_code = ""

for l in lines:
    try:
        d = json.loads(l)
        if d.get('success'):
            results.append(d)
            if not first_code:
                first_code = d.get('pickCode', '')
    except:
        pass

# Write success orders JSON to file
with open('/tmp/success_orders.json', 'w') as f:
    json.dump(results, f)

# Write first pick code to file
with open('/tmp/first_pick_code.txt', 'w') as f:
    f.write(first_code)

print(f"Parsed {len(results)} successful order(s), first code: {first_code}")
PYEOF

          echo "$JSONS" | python3 /tmp/parse_orders.py

          FIRST=$(cat /tmp/first_pick_code.txt 2>/dev/null || echo "")
          echo "pick_code=$FIRST" >> $GITHUB_OUTPUT
          echo "📋 First pick code: $FIRST"

          # Use multiline delimiter for success_orders to handle JSON safely
          SUCCESS_JSON=$(cat /tmp/success_orders.json 2>/dev/null || echo "[]")
          echo "success_orders<<EOF_ORDERS" >> $GITHUB_OUTPUT
          echo "$SUCCESS_JSON" >> $GITHUB_OUTPUT
          echo "EOF_ORDERS" >> $GITHUB_OUTPUT

          mkdir -p pickup_codes
          cp /tmp/success_orders.json pickup_codes/latest.json

          echo "📋 active_lockers.json after script ran:"
          cat pickup_codes/active_lockers.json 2>/dev/null || echo "(MISSING)"

          exit $EXIT_CODE

      - name: Send pickup code emails to customers
        if: success() && steps.generate.outputs.pick_code != ''
        env:
          GMAIL_USER:     covamarketplace@gmail.com
          GMAIL_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SUCCESS_ORDERS: ${{ steps.generate.outputs.success_orders }}
        run: |
          echo "📧 Sending pickup code emails..."
          echo "$SUCCESS_ORDERS" | python3 -c "
import sys, json, os, subprocess
orders = json.loads(sys.stdin.read())
print(f'Sending {len(orders)} email(s)...')
for o in orders:
    env = {**os.environ,
        'TO_EMAIL':        o.get('customerEmail',''),
        'CUSTOMER_NAME':   o.get('customerName',''),
        'ORDER_ID':        o.get('orderId',''),
        'PICK_CODE':       o.get('pickCode',''),
        'LOCKER':          o.get('locker',''),
        'PICKUP_LOCATION': o.get('orderLocation',''),
        'PICKUP_DATE':     o.get('pickupDate',''),
        'PICKUP_TIME':     o.get('pickupTime',''),
    }
    print(f"  → Sending to {o.get('customerEmail')} for order {o.get('orderId')}")
    subprocess.run(['node', 'send_email.js'], env=env, check=True)
  " 

      - name: Commit tracking files
        if: success() && steps.generate.outputs.pick_code != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f pickup_codes/active_lockers.json pickup_codes/latest.json

          echo "📋 Git status after add:"
          git status

          git diff --staged --quiet && echo "⚠️ Nothing to commit — file unchanged" || \
            ORDERS_STR=$(python3 -c "import json; o=json.load(open('/tmp/success_orders.json')); print(','.join([x.get('orderId','') for x in o]))" 2>/dev/null || echo "orders")
            git commit -m "Pickup codes generated for orders: $ORDERS_STR"

          git push origin main
