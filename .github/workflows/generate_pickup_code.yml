name: Generate XYZ Vending Pickup Code

on:
  push:
    paths:
      - 'orders/orders_*.json'
  workflow_dispatch:
    inputs:
      order_id:
        description: 'Shopify Order ID'
        required: false
        default: 'test-order'

jobs:
  generate-pickup-code:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show current active_lockers.json (debug)
        run: |
          echo "📋 Current active_lockers.json:"
          cat pickup_codes/active_lockers.json 2>/dev/null || echo "(file does not exist yet)"

      - name: Generate pickup code
        id: generate
        env:
          XYZ_TOKEN:  ${{ secrets.XYZ_TOKEN }}
          XYZ_FUN_ID: ${{ secrets.XYZ_FUN_ID }}
        run: |
          set +e
          OUTPUT=$(node generate_pickup_code.js 2>&1)
          echo "──────── Output ────────"
          echo "$OUTPUT"
          echo "────────────────────────"

          JSON=$(echo "$OUTPUT" | grep "OUTPUT_JSON:" | sed 's/OUTPUT_JSON://')
          PICK_CODE=$(echo "$JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('pickCode',''))" 2>/dev/null || echo "")
          LOCKER=$(echo "$JSON"    | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('locker',''))"    2>/dev/null || echo "")

          echo "pick_code=$PICK_CODE" >> $GITHUB_OUTPUT
          echo "locker=$LOCKER"       >> $GITHUB_OUTPUT

          mkdir -p pickup_codes
          echo "$JSON" > pickup_codes/latest.json

          echo "📋 active_lockers.json after script ran:"
          cat pickup_codes/active_lockers.json 2>/dev/null || echo "(missing — script did not write it)"

      - name: Send pickup code to customer
        if: success() && steps.generate.outputs.pick_code != ''
        env:
          PICK_CODE: ${{ steps.generate.outputs.pick_code }}
          ORDER_ID:  ${{ github.event.inputs.order_id }}
          LOCKER:    ${{ steps.generate.outputs.locker }}
        run: |
          echo "📦 Pickup code $PICK_CODE for order $ORDER_ID (locker $LOCKER)"

      - name: Commit tracking files
        if: success() && steps.generate.outputs.pick_code != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "📋 active_lockers.json about to be committed:"
          cat pickup_codes/active_lockers.json 2>/dev/null || echo "(MISSING — will not be committed)"

          git add pickup_codes/active_lockers.json pickup_codes/latest.json
          git diff --staged --quiet || git commit -m "Pickup code ${{ steps.generate.outputs.pick_code }} → locker ${{ steps.generate.outputs.locker }} (order ${{ github.event.inputs.order_id }})"
          git push origin main
