name: Generate XYZ Vending Pickup Code

on:
  push:
    paths:
      - 'orders/orders_*.json'
  workflow_dispatch:
    inputs:
      order_id:
        description: 'Shopify Order ID'
        required: true

jobs:
  generate-pickup-code:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── 3. Install Tesseract OCR (system dependency) ─────────────────────────
      - name: Install Tesseract OCR
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      # ── 4. Install Chrome system dependencies ────────────────────────────────
      - name: Install Chrome dependencies
        run: |
          sudo apt-get install -y \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libasound2t64

      # ── 5. Install Node dependencies ─────────────────────────────────────────
      - name: Install Node dependencies
        run: |
          npm init -y
          npm install puppeteer node-tesseract-ocr

      # ── 6. Generate pickup code ───────────────────────────────────────────────
      - name: Generate pickup code
        id: generate
        env:
          XYZ_USERNAME: ${{ secrets.XYZ_USERNAME }}
          XYZ_PASSWORD: ${{ secrets.XYZ_PASSWORD }}
          XYZ_DEVICE:   ${{ secrets.XYZ_DEVICE }}
        run: |
          OUTPUT=$(node generate_pickup_code.js 2>&1)
          echo "$OUTPUT"

          # Extract the JSON output line
          JSON=$(echo "$OUTPUT" | grep "OUTPUT_JSON:" | sed 's/OUTPUT_JSON://')
          echo "result=$JSON" >> $GITHUB_OUTPUT

          # Extract pickup code for subsequent steps
          PICK_CODE=$(echo "$JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('pickCode',''))")
          echo "pick_code=$PICK_CODE" >> $GITHUB_OUTPUT
          echo "✅ Pickup code: $PICK_CODE"

      # ── 7. Upload debug artifacts on failure ─────────────────────────────────
      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: |
            error_screenshot.png
            captcha.png

      # ── 8. Send pickup code to customer ──────────────────────────────────────
      - name: Send pickup code to customer
        if: success()
        env:
          PICK_CODE:            ${{ steps.generate.outputs.pick_code }}
          SHOPIFY_WEBHOOK_URL:  ${{ secrets.SHOPIFY_WEBHOOK_URL }}
        run: |
          echo "📦 Sending pickup code $PICK_CODE to customer..."
          # Add your notification method below — pick one:
          #
          # Option A — Trigger a Shopify flow / webhook:
          # curl -s -X POST "$SHOPIFY_WEBHOOK_URL" \
          #   -H "Content-Type: application/json" \
          #   -d "{\"pick_code\": \"$PICK_CODE\"}"
          #
          # Option B — Send WhatsApp via Twilio:
          # curl -s -X POST "[api.twilio.com](https://api.twilio.com/2010-04-01/Accounts/$TWILIO_SID/Messages.json)" \
          #   --data-urlencode "To=whatsapp:+60XXXXXXXXX" \
          #   --data-urlencode "From=whatsapp:$TWILIO_WHATSAPP_FROM" \
          #   --data-urlencode "Body=Your pickup code is: $PICK_CODE" \
          #   -u "$TWILIO_SID:$TWILIO_AUTH_TOKEN"
          #
          # Option C — POST to Make.com / Zapier webhook:
          # curl -s -X POST "[hook.make.com](https://hook.make.com/YOUR_HOOK_ID)" \
          #   -H "Content-Type: application/json" \
          #   -d "{\"pick_code\": \"$PICK_CODE\", \"order_id\": \"${{ github.event.inputs.order_id }}\"}"
          echo "PICK_CODE=$PICK_CODE" >> $GITHUB_ENV

      # ── 9. Save pickup code result to repo ───────────────────────────────────
      - name: Save pickup code result
        if: success()
        run: |
          mkdir -p pickup_codes
          echo '${{ steps.generate.outputs.result }}' > pickup_codes/latest.json
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add pickup_codes/
          git diff --staged --quiet || git commit -m "Add pickup code ${{ steps.generate.outputs.pick_code }}"
          git push
