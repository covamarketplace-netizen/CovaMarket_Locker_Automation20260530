name: Generate XYZ Vending Pickup Code

on:
  push:
    paths:
      - 'order_consolidation/orders_*.json'
  workflow_dispatch:  # no inputs needed — everything comes from the order JSON

jobs:
  generate-pickup-code:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install qrcode

      - name: Show current active_lockers.json
        run: |
          echo "📋 Current active_lockers.json:"
          cat pickup_codes/active_lockers.json 2>/dev/null || echo "(file does not exist yet)"

      - name: Resolve order file path
        id: order_file
        run: |
          FILE=$(ls order_consolidation/orders_*.json 2>/dev/null | sort | tail -1)
          if [ -z "$FILE" ]; then echo "❌ No order file found in order_consolidation/"; exit 1; fi
          echo "path=$FILE" >> $GITHUB_OUTPUT
          echo "📋 Using order file: $FILE"

      - name: Generate pickup code
        id: generate
        env:
          XYZ_TOKEN:   ${{ secrets.XYZ_TOKEN }}
          ORDERS_FILE: ${{ steps.order_file.outputs.path }}
        run: |
          set +e
          node generate_pickup_code.js 2>&1 | tee /tmp/node_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "────────────────────────"

          # Extract OUTPUT_JSON lines to temp file
          grep "OUTPUT_JSON:" /tmp/node_output.txt | sed 's/OUTPUT_JSON://' > /tmp/jsons.txt
          echo "📦 JSON lines found: $(wc -l < /tmp/jsons.txt)"

          # Use node to parse results (avoids Python-in-YAML indentation issues)
          node -e "
            const fs = require('fs');
            const lines = fs.readFileSync('/tmp/jsons.txt','utf8').trim().split('\n').filter(Boolean);
            const results = [];
            let firstCode = '';
            for (const l of lines) {
              try {
                const d = JSON.parse(l);
                if (d.success) {
                  results.push(d);
                  if (!firstCode) firstCode = d.pickCode || '';
                }
              } catch(e) {}
            }
            fs.writeFileSync('/tmp/success_orders.json', JSON.stringify(results));
            fs.writeFileSync('/tmp/first_pick_code.txt', firstCode);
            console.log('Parsed ' + results.length + ' successful order(s), first code: ' + firstCode);
          "

          FIRST=$(cat /tmp/first_pick_code.txt 2>/dev/null || echo "")
          echo "pick_code=$FIRST" >> $GITHUB_OUTPUT
          echo "📋 First pick code: $FIRST"

          # Multiline delimiter for JSON output
          echo "success_orders<<EOF_ORDERS" >> $GITHUB_OUTPUT
          cat /tmp/success_orders.json >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF_ORDERS" >> $GITHUB_OUTPUT

          mkdir -p pickup_codes
          cp /tmp/success_orders.json pickup_codes/latest.json 2>/dev/null || echo "[]" > pickup_codes/latest.json

          echo "📋 active_lockers.json after script ran:"
          cat pickup_codes/active_lockers.json 2>/dev/null || echo "(MISSING)"

          exit $EXIT_CODE

      - name: Send pickup code emails to customers
        if: success() && steps.generate.outputs.pick_code != ''
        env:
          GMAIL_USER:     covamarketplace@gmail.com
          GMAIL_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SUCCESS_ORDERS: ${{ steps.generate.outputs.success_orders }}
        run: |
          echo "📧 Sending pickup code emails..."
          node -e "
            const { execSync } = require('child_process');
            const fs = require('fs');
            const orders = JSON.parse(fs.readFileSync('/tmp/success_orders.json', 'utf8'));
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const validOrders = orders.filter(o => {
              const email = (o.customerEmail || '').trim();
              if (!email || email === 'N/A' || !emailRegex.test(email)) {
                console.log('  ⚠️  Skipping order ' + o.orderId + ' — no valid email (got: ' + (o.customerEmail || 'empty') + ')');
                return false;
              }
              return true;
            });
            console.log('Sending ' + validOrders.length + ' email(s) (skipped ' + (orders.length - validOrders.length) + ' with missing/invalid email)...');
            for (const o of validOrders) {
              const env = {
                ...process.env,
                TO_EMAIL:        o.customerEmail || '',
                CUSTOMER_NAME:   o.customerName  || '',
                ORDER_ID:        o.orderId        || '',
                PICK_CODE:       o.pickCode       || '',
                LOCKER:          o.locker         || '',
                PICKUP_LOCATION: o.orderLocation  || '',
                PICKUP_DATE:     o.pickupDate     || '',
                PICKUP_TIME:     o.pickupTime     || '',
              };
              console.log('  Sending to ' + o.customerEmail + ' for order ' + o.orderId);
              execSync('node send_email.js', { env, stdio: 'inherit' });
            }
          " 

      - name: Commit tracking files
        if: success() && steps.generate.outputs.pick_code != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f pickup_codes/active_lockers.json pickup_codes/latest.json

          echo "📋 Git status after add:"
          git status

          git diff --staged --quiet && echo "⚠️ Nothing to commit — file unchanged" || \
            ORDERS_STR=$(python3 -c "import json; o=json.load(open('/tmp/success_orders.json')); print(','.join([x.get('orderId','') for x in o]))" 2>/dev/null || echo "orders")
            git commit -m "Pickup codes generated for orders: $ORDERS_STR"

          git push origin main
