name: Generate XYZ Vending Pickup Code

on:
  push:
    paths:
      - 'orders/orders_*.json'
  workflow_dispatch:
    inputs:
      order_id:
        description: 'Shopify Order ID'
        required: false
        default: 'test-order'
      customer_name:
        description: 'Customer Name'
        required: false
        default: 'Valued Customer'
      customer_email:
        description: 'Customer Email'
        required: false
        default: 'alejandra.evander92@gmail.com'
      pickup_location:
        description: 'Pickup Location'
        required: false
        default: 'CovaMarket Locker'
      pickup_date:
        description: 'Pickup Date'
        required: false
        default: 'N/A'
      pickup_time:
        description: 'Pickup Time'
        required: false
        default: 'N/A'

jobs:
  generate-pickup-code:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show current active_lockers.json
        run: |
          echo "📋 Current active_lockers.json:"
          cat pickup_codes/active_lockers.json 2>/dev/null || echo "(file does not exist yet)"

      - name: Resolve order file path
        id: order_file
        run: |
          FILE=$(ls orders/orders_*.json 2>/dev/null | sort | head -1)
          if [ -z "$FILE" ]; then echo "❌ No order file found in orders/"; exit 1; fi
          echo "path=$FILE" >> $GITHUB_OUTPUT
          echo "📋 Using order file: $FILE"

      - name: Generate pickup code
        id: generate
        env:
          XYZ_TOKEN:   ${{ secrets.XYZ_TOKEN }}
          ORDERS_FILE: ${{ steps.order_file.outputs.path }}
        run: |
          set +e
          OUTPUT=$(node generate_pickup_code.js 2>&1)
          EXIT_CODE=$?
          echo "──────── Output ────────"
          echo "$OUTPUT"
          echo "────────────────────────"

          JSON=$(echo "$OUTPUT" | grep "OUTPUT_JSON:" | sed 's/OUTPUT_JSON://')
          extract() { echo "$JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('$1',''))" 2>/dev/null || echo ""; }

          PICK_CODE=$(extract pickCode)
          LOCKER=$(extract locker)
          CUSTOMER_NAME=$(extract customerName)
          CUSTOMER_EMAIL=$(extract customerEmail)
          ORDER_ID=$(extract orderId)
          ORDER_LOCATION=$(extract orderLocation)
          PICKUP_DATE=$(extract pickupDate)
          PICKUP_TIME=$(extract pickupTime)

          echo "pick_code=$PICK_CODE"         >> $GITHUB_OUTPUT
          echo "locker=$LOCKER"               >> $GITHUB_OUTPUT
          echo "customer_name=$CUSTOMER_NAME" >> $GITHUB_OUTPUT
          echo "customer_email=$CUSTOMER_EMAIL" >> $GITHUB_OUTPUT
          echo "order_id=$ORDER_ID"           >> $GITHUB_OUTPUT
          echo "order_location=$ORDER_LOCATION" >> $GITHUB_OUTPUT
          echo "pickup_date=$PICKUP_DATE"     >> $GITHUB_OUTPUT
          echo "pickup_time=$PICKUP_TIME"     >> $GITHUB_OUTPUT

          mkdir -p pickup_codes
          echo "$JSON" > pickup_codes/latest.json

          echo "📋 active_lockers.json after script ran:"
          cat pickup_codes/active_lockers.json 2>/dev/null || echo "(MISSING)"

          exit $EXIT_CODE

      - name: Send pickup code email to customer
        if: success() && steps.generate.outputs.pick_code != ''
        env:
          GMAIL_USER:      covamarketplace@gmail.com
          GMAIL_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL:        ${{ steps.generate.outputs.customer_email }}
          CUSTOMER_NAME:   ${{ steps.generate.outputs.customer_name }}
          ORDER_ID:        ${{ steps.generate.outputs.order_id }}
          PICK_CODE:       ${{ steps.generate.outputs.pick_code }}
          LOCKER:          ${{ steps.generate.outputs.locker }}
          PICKUP_LOCATION: ${{ steps.generate.outputs.order_location }}
          PICKUP_DATE:     ${{ steps.generate.outputs.pickup_date }}
          PICKUP_TIME:     ${{ steps.generate.outputs.pickup_time }}
        run: |
          echo "📧 Sending pickup code email..."
          node send_email.js

      - name: Commit tracking files
        if: success() && steps.generate.outputs.pick_code != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f pickup_codes/active_lockers.json pickup_codes/latest.json

          echo "📋 Git status after add:"
          git status

          git diff --staged --quiet && echo "⚠️ Nothing to commit — file unchanged" || \
            git commit -m "Pickup code ${{ steps.generate.outputs.pick_code }} → locker ${{ steps.generate.outputs.locker }} (order ${{ steps.generate.outputs.order_id }})"

          git push origin main
