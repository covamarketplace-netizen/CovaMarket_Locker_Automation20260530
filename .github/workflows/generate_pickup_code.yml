name: Generate XYZ Vending Pickup Code

on:
  push:
    paths:
      - 'orders/orders_*.json'
  workflow_dispatch:
    inputs:
      order_id:
        description: 'Shopify Order ID'
        required: false
        default: 'test-order'

jobs:
  generate-pickup-code:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate pickup code
        id: generate
        env:
          XYZ_TOKEN:  ${{ secrets.XYZ_TOKEN }}
          XYZ_FUN_ID: ${{ secrets.XYZ_FUN_ID }}
        run: |
          set +e
          OUTPUT=$(node generate_pickup_code.js 2>&1)
          echo "──────── Output ────────"
          echo "$OUTPUT"
          echo "────────────────────────"
          JSON=$(echo "$OUTPUT" | grep "OUTPUT_JSON:" | sed 's/OUTPUT_JSON://')
          echo "result=$JSON" >> $GITHUB_OUTPUT
          PICK_CODE=$(echo "$JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('pickCode',''))" 2>/dev/null || echo "")
          LOCKER=$(echo "$JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('locker',''))" 2>/dev/null || echo "")
          echo "pick_code=$PICK_CODE" >> $GITHUB_OUTPUT
          echo "locker=$LOCKER" >> $GITHUB_OUTPUT
          echo "✅ Pickup code: $PICK_CODE for locker: $LOCKER"

      - name: Send pickup code to customer
        if: success() && steps.generate.outputs.pick_code != ''
        env:
          PICK_CODE: ${{ steps.generate.outputs.pick_code }}
          ORDER_ID:  ${{ github.event.inputs.order_id }}
          LOCKER:    ${{ steps.generate.outputs.locker }}
        run: |
          echo "📦 Pickup code $PICK_CODE for order $ORDER_ID (locker $LOCKER)"
          # Add WhatsApp/email notification here

      - name: Commit active_lockers.json and result
        if: success() && steps.generate.outputs.pick_code != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main

          # Re-run script to get the updated active_lockers.json into this checkout
          # (the file was written during the generate step above, but reset --hard wiped it)
          # So we just write it directly from the saved output
          mkdir -p pickup_codes
          echo '${{ steps.generate.outputs.result }}' > pickup_codes/latest.json

          # Restore active_lockers.json by re-reading what the script produced
          # The script already wrote it to disk before reset — we need to re-generate it.
          # Simpler: store the active_lockers update as a separate output and apply it here.
          node -e "
            const fs = require('fs');
            const trackingFile = 'pickup_codes/active_lockers.json';
            let active = {};
            try { active = JSON.parse(fs.readFileSync(trackingFile, 'utf8')); } catch {}
            const result = JSON.parse('${{ steps.generate.outputs.result }}');
            if (result.success && result.roadId) {
              active[result.roadId] = {
                pickCode:  result.pickCode,
                orderNo:   result.orderNo || null,
                locker:    result.locker,
                goodsId:   result.goodsId,
                createdAt: result.generatedAt,
              };
              fs.writeFileSync(trackingFile, JSON.stringify(active, null, 2));
              console.log('Updated active_lockers.json:', JSON.stringify(active, null, 2));
            }
          "

          git add pickup_codes/
          git diff --staged --quiet || git commit -m "Pickup code ${{ steps.generate.outputs.pick_code }} → locker ${{ steps.generate.outputs.locker }} (order ${{ github.event.inputs.order_id }})"
          git push origin main
